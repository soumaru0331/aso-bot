        - generic [ref=e5875]:
          - generic [ref=e5876]:
            - img
            - paragraph [ref=e5878]: "\"On our previous rent day, we saw traffic of 1,500+ requests per second that were all being fulfilled in under 50 milliseconds, which is really great. Our technical team is really impressed with scale like that.\""
            - generic [ref=e5880]:
              - generic [ref=e5881]: Kartik Aggarwal
              - generic [ref=e5882]: Tech Lead at Bilt
          - generic [ref=e5883]:
            - img
            - paragraph [ref=e5885]: "\"Services that took 1 week to configure elsewhere take 1 day to spin up in Railway. Messy networking like on other cloud platforms doesn't exist on Railway. If you understand basic TCP, you're all set.\""
            - generic [ref=e5887]:
              - generic [ref=e5888]: Daniel Lobaton
              - generic [ref=e5889]: CTO at G2X
          - generic [ref=e5890]:
            - img
            - paragraph [ref=e5892]: "\"Railway streamlines and accelerates our entire operation. It gives us instant observability into our services and makes spinning up self-hosted third-party tools almost effortless. This reduces friction in experimentation and shortens our deployment cycles significantly.\""
