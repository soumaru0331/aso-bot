services:
  - type: web
    name: aso-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DB_PATH
        value: /opt/render/project/src/bot.db
      - key: PYTHON_VERSION
        value: 3.11.0
